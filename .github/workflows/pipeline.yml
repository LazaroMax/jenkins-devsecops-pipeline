name: DevSecOps Pipeline - UMG Lazaro

on:
  push:
    branches: [ master, main ]

jobs:

  package-management:
    name: Manejo de Paquetes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Instalar dependencias
        run: |
          sudo apt-get update
          echo "Paquetes del sistema actualizados"

      - name: Verificar herramientas disponibles
        run: |
          docker --version
          echo "Herramientas listas"

  sast:
    name: SAST - Trivy File System Scan
    runs-on: ubuntu-latest
    needs: package-management
    steps:
      - uses: actions/checkout@v3

      - name: Instalar Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Ejecutar SAST con Trivy
        run: |
          trivy fs . --severity HIGH,CRITICAL --exit-code 0 \
            --format json --output trivy-sast-report.json
          trivy fs . --severity HIGH,CRITICAL --exit-code 0

      - name: Subir reporte SAST
        uses: actions/upload-artifact@v3
        with:
          name: trivy-sast-report
          path: trivy-sast-report.json

  dast:
    name: DAST - OWASP ZAP Scan
    runs-on: ubuntu-latest
    needs: sast
    steps:
      - uses: actions/checkout@v3

      - name: Levantar app de prueba
        run: |
          docker run -d --name test-app -p 8080:80 nginx:alpine
          sleep 5
          curl -f http://localhost:8080 && echo "App corriendo OK"

      - name: Ejecutar DAST con OWASP ZAP
        run: |
          docker run --network="host" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost:8080 \
            -r zap-report.html --auto || true

      - name: Detener app
        run: docker stop test-app || true

  build-completo:
    name: Ejecucion Completa - Build
    runs-on: ubuntu-latest
    needs: [sast, dast]
    steps:
      - uses: actions/checkout@v3

      - name: Verificar vulnerabilidades de imagen con Trivy
        run: |
          docker pull nginx:alpine
          trivy image nginx:alpine --exit-code 0 \
            --severity HIGH,CRITICAL || true

      - name: Resumen Final
        run: |
          echo "================================="
          echo "  Pipeline DevSecOps Completo"
          echo "  Alumno: Lazaro Carlos"
          echo "  Curso: Ingenieria de Software"
          echo "================================="
          echo "✅ Manejo de Paquetes - OK"
          echo "✅ SAST con Trivy     - OK"
          echo "✅ DAST con OWASP ZAP - OK"
          echo "✅ Build Completo     - OK"
          echo "================================="
